# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - vance

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vance-azure-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Validate package manifests
        run: |
          test -f package.json
          test -f package-lock.json

      - name: Install production dependencies
        run: |
          npm ci --omit=dev

      - name: Create deployment package
        run: |
          zip -r release.zip . \
            -x ".git/*" ".github/*" ".vscode/*" \
               ".browser-profile/*" ".api.env" \
               "account*.txt" \
               "temp/*" "runlog*" "start.out*" \
               "*.log" "*.sqlite" "*.sqlite-shm" "*.sqlite-wal"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Delay to avoid SCM restart race
        run: sleep 20
      
      - name: Deploy to Azure Web App (attempt 1)
        id: deploy_attempt_1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'vance'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4039FC4023204AF0BCBF4E6713A81172 }}

      - name: Wait before retry after conflict
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 45

      - name: Deploy to Azure Web App (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        id: deploy_attempt_2
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'vance'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4039FC4023204AF0BCBF4E6713A81172 }}

      - name: Fail if deploy still unsuccessful
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "Deploy failed after retry (likely persistent OneDeploy lock/conflict)."
          exit 1
